name: publish-ghcr

on:
  push:
    branches: ["main"]
    tags: ["v*", "*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract proxy Docker metadata
        id: meta_proxy
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push proxy
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta_proxy.outputs.tags }}
          labels: ${{ steps.meta_proxy.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract SearXNG Docker metadata
        id: meta_searxng
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/websearch-searxng
          tags: |
            type=raw,value=2026.4.24-a7ac696b4
            type=sha,prefix=sha-

      - name: Build and push SearXNG
        uses: docker/build-push-action@v7
        with:
          context: ./searxng
          file: ./searxng/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta_searxng.outputs.tags }}
          labels: ${{ steps.meta_searxng.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
